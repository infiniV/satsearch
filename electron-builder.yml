appId: com.satsearch.app
productName: satsearch
directories:
  buildResources: build
  output: dist

# Distribution model: thin installer + first-run `uv` bootstrap (docs/DISTRIBUTION.md).
# We ship the sidecar *source* + the bundled `uv` binary as extraResources — NOT a
# prebuilt venv (a CI-built venv is not relocatable) and NOT inside the asar
# (child_process.spawn cannot execute an interpreter packed in app.asar). On first
# run the app runs `uv sync` into a writable dir under userData. Accessed at runtime
# via process.resourcesPath/{sidecar,bin}.
files:
  - out/**
  - package.json
  - '!sidecar/**'

extraResources:
  - from: sidecar
    to: sidecar
    filter:
      - '**/*'
      - '!.venv/**' # never ship a dev/CI venv — it is not relocatable
      - '!**/__pycache__/**'
      - '!**/*.pyc'
      - '!**/tests/**'
      - '!.pytest_cache/**'
  # The `uv` binary, downloaded per-target-OS by scripts/fetch-uv.mjs before packaging.
  - from: resources/bin
    to: bin
    filter:
      - '**/*'

# Native .node addons (sharp) must be unpacked so they can be loaded at runtime.
asarUnpack:
  - '**/*.node'
  - '**/node_modules/sharp/**'

linux:
  target:
    - AppImage
  category: Science

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# On a git tag, electron-builder would otherwise try to publish to GitHub itself
# (and fail without GH_TOKEN). The release workflow's `release` job owns uploading
# the artifacts to the GitHub Release instead.
publish: null
